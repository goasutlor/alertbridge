# alertbridge-lite - OCP DEV Deployment via Pre-built Image (v1.0.08022026)
#
# Use this when OCP BuildConfig fails (e.g. proxy blocks pip). Image is built by GitHub Actions
# and pushed to ghcr.io on every push to main.
#
# Deploy steps:
# 1. Image is at ghcr.io/goasutlor/alertbridge-lite:latest (auto-built on push to main)
#
# 2. Edit Secret (TARGET_URL_*, API keys, BASIC_AUTH_*).
#
# 3. If 403 Forbidden when pulling: create GHCR pull secret (uncomment imagePullSecrets below):
#    oc create secret docker-registry ghcr-pull-secret \
#      --docker-server=ghcr.io --docker-username=goasutlor --docker-password=YOUR_GITHUB_PAT \
#      -n alertbridge-dev
#
# 4. oc apply -f deploy/install-ocp-pull-dev.yaml
# 5. automountServiceAccountToken: true on alertbridge-lite-dev for ConfigMap patch from UI.
# 6. PVC alertbridge-dlq-dev may stay Pending until the app pod schedules (WaitForFirstConsumer).
# 7. oc get route -n alertbridge-dev
# 8. Test: curl -k https://<route>/healthz
#
# DEV namespace: alertbridge-dev — AlertBridge + ServiceMonitor + Route + DLQ PVC (20Gi).

---
apiVersion: v1
kind: Namespace
metadata:
  name: alertbridge-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertbridge-lite-dev
  namespace: alertbridge-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alertbridge-configmap-editor-dev
  namespace: alertbridge-dev
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["alertbridge-rules-dev"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alertbridge-configmap-editor-dev
  namespace: alertbridge-dev
subjects:
  - kind: ServiceAccount
    name: alertbridge-lite-dev
    namespace: alertbridge-dev
roleRef:
  kind: Role
  name: alertbridge-configmap-editor-dev
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertbridge-rules-dev
  namespace: alertbridge-dev
data:
  rules.yaml: |
    version: 1
    defaults:
      target_timeout_connect_sec: 2
      target_timeout_read_sec: 5
    routes:
    - name: ocp-alertmanager
      match:
        source: ocp
      unroll_alerts: true
      target:
        url_env: TARGET_URL_OCP
        api_key_header: X-API-Key
        api_key_env: TARGET_API_KEY_OCP
      transform:
        include_fields: [alerts, commonAnnotations, commonLabels, groupLabels]
        output_template:
          type: flat
          fields:
            title: $.groupLabels.alertname
            message: $.commonAnnotations.summary
            status: $.alerts.0.status
    auth:
      api_keys:
        required: false
        keys: []
---
apiVersion: v1
kind: Secret
metadata:
  name: alertbridge-secrets-dev
  namespace: alertbridge-dev
type: Opaque
stringData:
  TARGET_URL_OCP: "https://example.ocp.target/webhook"
  TARGET_API_KEY_OCP: "change-me"
  # Basic Auth for UI (enabled by default). CHANGE password before production!
  BASIC_AUTH_USER: "admin"
  BASIC_AUTH_PASSWORD: "change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertbridge-lite-dev
  namespace: alertbridge-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertbridge-lite-dev
  template:
    metadata:
      labels:
        app: alertbridge-lite-dev
    spec:
      automountServiceAccountToken: true
      serviceAccountName: alertbridge-lite-dev
      # Uncomment if package is private or cluster gets 403 when pulling from ghcr.io:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
        - name: alertbridge-lite-dev
          image: ghcr.io/goasutlor/alertbridge-lite:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ALERTBRIDGE_CONFIGMAP_NAME
              value: "alertbridge-rules-dev"
            - name: ALERTBRIDGE_CONFIG_WATCH_INTERVAL
              value: "30"
            - name: ALERTBRIDGE_DLQ_FILE
              value: "/var/dlq/failed.jsonl"
            - name: TARGET_URL_OCP
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets-dev
                  key: TARGET_URL_OCP
            - name: TARGET_API_KEY_OCP
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets-dev
                  key: TARGET_API_KEY_OCP
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets-dev
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets-dev
                  key: BASIC_AUTH_PASSWORD
            - name: ALERTBRIDGE_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALERTBRIDGE_K8S_SERVICE_NAME
              value: "alertbridge-lite-dev"
          volumeMounts:
            - name: rules
              mountPath: /etc/alertbridge/rules.yaml
              subPath: rules.yaml
            - name: dlq
              mountPath: /var/dlq
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: rules
          configMap:
            name: alertbridge-rules-dev
            items:
              - key: rules.yaml
                path: rules.yaml
        - name: dlq
          persistentVolumeClaim:
            claimName: alertbridge-dlq-dev
---
apiVersion: v1
kind: Service
metadata:
  name: alertbridge-lite-dev
  namespace: alertbridge-dev
  labels:
    app: alertbridge-lite-dev
spec:
  selector:
    app: alertbridge-lite-dev
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alertbridge-lite-dev
  namespace: alertbridge-dev
spec:
  selector:
    matchLabels:
      app: alertbridge-lite-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: alertbridge-lite-dev
  namespace: alertbridge-dev
spec:
  to:
    kind: Service
    name: alertbridge-lite-dev
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertbridge-dlq-dev
  namespace: alertbridge-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
