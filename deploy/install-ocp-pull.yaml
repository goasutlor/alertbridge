# alertbridge-lite - OCP Deployment via Pre-built Image (v1.0.08022026)
#
# Use this when OCP BuildConfig fails (e.g. proxy blocks pip). Image is built by GitHub Actions
# and pushed to ghcr.io on every push to main.
#
# Deploy steps:
# 1. Image is at ghcr.io/goasutlor/alertbridge-lite:latest (auto-built on push to main)
#
# 2. Edit Secret (TARGET_URL_*, API keys, BASIC_AUTH_*). Default UI login: admin/P@ssw0rd2026
#
# 3. If 403 Forbidden when pulling: create GHCR pull secret (uncomment imagePullSecrets below):
#    oc create secret docker-registry ghcr-pull-secret \
#      --docker-server=ghcr.io --docker-username=goasutlor --docker-password=YOUR_GITHUB_PAT \
#      -n alertbridge
#
# 4. oc apply -f deploy/install-ocp-pull.yaml
# 5. oc get route -n alertbridge   # get webhook URL
# 6. Test: curl -k https://<route>/healthz
#
# Includes in-cluster Loki + Promtail (PVC 50Gi, default StorageClass) for Log archive.
# If Promtail cannot start due to SCC on OpenShift:
#   oc adm policy add-scc-to-user privileged -z promtail -n alertbridge

---
apiVersion: v1
kind: Namespace
metadata:
  name: alertbridge
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertbridge-lite
  namespace: alertbridge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alertbridge-configmap-editor
  namespace: alertbridge
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["alertbridge-rules"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alertbridge-configmap-editor
  namespace: alertbridge
subjects:
  - kind: ServiceAccount
    name: alertbridge-lite
    namespace: alertbridge
roleRef:
  kind: Role
  name: alertbridge-configmap-editor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertbridge-rules
  namespace: alertbridge
data:
  rules.yaml: |
    version: 1
    defaults:
      target_timeout_connect_sec: 2
      target_timeout_read_sec: 5
    routes:
    - name: ocp-alertmanager
      match:
        source: ocp
      unroll_alerts: true
      target:
        url_env: TARGET_URL_OCP
        api_key_header: X-API-Key
        api_key_env: TARGET_API_KEY_OCP
      transform:
        include_fields: [alerts, commonAnnotations, commonLabels, groupLabels]
        output_template:
          type: flat
          fields:
            title: $.groupLabels.alertname
            message: $.commonAnnotations.summary
            status: $.alerts.0.status
    - name: confluent-alerts
      match:
        source: confluent
      target:
        url_env: TARGET_URL_CONFLUENT
        api_key_header: X-API-Key
        api_key_env: TARGET_API_KEY_CONFLUENT
      transform:
        include_fields: [alertId, description, severity]
        output_template:
          type: flat
          fields:
            alert_id: $.alertId
            message: $.description
            severity: $.severity
    auth:
      api_keys:
        required: false
        keys: []
---
apiVersion: v1
kind: Secret
metadata:
  name: alertbridge-secrets
  namespace: alertbridge
type: Opaque
stringData:
  TARGET_URL_OCP: "https://example.ocp.target/webhook"
  TARGET_API_KEY_OCP: "change-me"
  TARGET_URL_CONFLUENT: "https://example.confluent.target/webhook"
  TARGET_API_KEY_CONFLUENT: "change-me"
  # Basic Auth for UI (enabled by default). CHANGE password before production!
  BASIC_AUTH_USER: "admin"
  BASIC_AUTH_PASSWORD: "P@ssw0rd2026"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertbridge-lite
  namespace: alertbridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertbridge-lite
  template:
    metadata:
      labels:
        app: alertbridge-lite
    spec:
      serviceAccountName: alertbridge-lite
      # Uncomment if package is private or cluster gets 403 when pulling from ghcr.io:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
        - name: alertbridge-lite
          image: ghcr.io/goasutlor/alertbridge-lite:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ALERTBRIDGE_CONFIGMAP_NAME
              value: "alertbridge-rules"
            - name: ALERTBRIDGE_CONFIG_WATCH_INTERVAL
              value: "30"
            # In-cluster Loki (same namespace: Service loki:3100). Log search in Portal uses this URL.
            - name: ALERTBRIDGE_LOKI_URL
              value: "http://loki:3100"
            - name: ALERTBRIDGE_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALERTBRIDGE_K8S_APP_LABEL
              value: "alertbridge-lite"
            - name: TARGET_URL_OCP
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: TARGET_URL_OCP
            - name: TARGET_API_KEY_OCP
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: TARGET_API_KEY_OCP
            - name: TARGET_URL_CONFLUENT
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: TARGET_URL_CONFLUENT
            - name: TARGET_API_KEY_CONFLUENT
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: TARGET_API_KEY_CONFLUENT
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alertbridge-secrets
                  key: BASIC_AUTH_PASSWORD
          volumeMounts:
            - name: rules
              mountPath: /etc/alertbridge/rules.yaml
              subPath: rules.yaml
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: rules
          configMap:
            name: alertbridge-rules
            items:
              - key: rules.yaml
                path: rules.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: alertbridge-lite
  namespace: alertbridge
  labels:
    app: alertbridge-lite
spec:
  selector:
    app: alertbridge-lite
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# ServiceMonitor: so OCP Observe can scrape /metrics (requires user-workload monitoring)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alertbridge-lite
  namespace: alertbridge
spec:
  selector:
    matchLabels:
      app: alertbridge-lite
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: alertbridge-lite
  namespace: alertbridge
spec:
  host: alertbridge-lite.apps.cwdc.esb-kafka-prod.intra.ais  # EDIT: match your cluster apps domain
  to:
    kind: Service
    name: alertbridge-lite
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: None
# PVC + px-* SC บ่อยครั้งใช้ volumeBindingMode: WaitForFirstConsumer → Status Pending จนกว่า
# Scheduler จะกำหนด node ให้ Pod ที่ mount claim นี้ (เช่น loki) แล้วค่อย Bound — ไม่ใช่ error
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: alertbridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: alertbridge
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_address: 0.0.0.0
      http_listen_port: 3100
      grpc_listen_address: 0.0.0.0
      grpc_listen_port: 9096
      log_level: info

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
        cache_ttl: 24h
        resync_interval: 5m

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h

    limits_config:
      retention_period: 336h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: alertbridge
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: loki
    spec:
      # OCP restricted-v2: ห้ามกำหนด runAsUser/fsGroup เอง (เช่น 10001) ต้องอยู่ใน range ของโปรเจกต์ —
      # ปล่อยให้คลัสเตอร์กำหนด UID/supplemental group ให้กับ Pod + PVC mount แทน
      containers:
        - name: loki
          image: grafana/loki:2.9.8
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9096
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: alertbridge
  labels:
    app: loki
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: alertbridge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alertbridge-promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alertbridge-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alertbridge-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: alertbridge
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: alertbridge
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.alertbridge.svc:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - alertbridge
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: alertbridge
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yaml
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: positions
              mountPath: /run/promtail
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: positions
          emptyDir: {}
